name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --project packages/llmzk-tools --all-extras

      - name: Lint Python
        run: >-
          uv run --project packages/llmzk-tools ruff check
          packages/llmzk-tools/src
          packages/llmzk-tools/tests
          scripts/build-scaffold.py
          tests/integration

      - name: Check shell syntax
        run: bash -n scripts/*.sh

      - name: Test
        run: >-
          uv run --project packages/llmzk-tools pytest
          packages/llmzk-tools/tests
          tests/integration

      - name: Build distributable scaffold
        run: python3 scripts/build-scaffold.py

      - name: Verify generated scaffold
        run: python3 scripts/build-scaffold.py --check
